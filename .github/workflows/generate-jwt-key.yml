name: Generate JWT Key

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate PKCS8 private key and JWKS
        run: |
          # Gera chave privada PKCS8
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 2>/dev/null > private.pem
          
          echo "=== JWT_PRIVATE_KEY ==="
          cat private.pem
          
          # Gera chave pública
          openssl rsa -in private.pem -pubout 2>/dev/null > public.pem
          
          # Gera JWKS usando node
          node -e "
          const crypto = require('crypto');
          const fs = require('fs');
          const pub = fs.readFileSync('public.pem', 'utf8');
          const key = crypto.createPublicKey(pub);
          const jwk = key.export({ format: 'jwk' });
          jwk.use = 'sig';
          jwk.alg = 'RS256';
          jwk.kid = 'default';
          const jwks = { keys: [jwk] };
          console.log('=== JWKS ===');
          console.log(JSON.stringify(jwks));
          "

