name: Generate JWT Key

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate PKCS8 private key and JWKS
        run: |
          # Gera chave privada PKCS8 (BEGIN PRIVATE KEY - não RSA PRIVATE KEY)
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out private.pem 2>/dev/null
          
          echo ""
          echo "========================================="
          echo "COLE ISSO NO CONVEX COMO JWT_PRIVATE_KEY"
          echo "========================================="
          cat private.pem
          echo "========================================="
          
          # Verifica que é mesmo PKCS8
          head -1 private.pem
          
          # Gera chave pública
          openssl rsa -in private.pem -pubout -out public.pem 2>/dev/null
          
          # Gera JWKS
          node -e "
          const crypto = require('crypto');
          const fs = require('fs');
          const pub = fs.readFileSync('public.pem', 'utf8');
          const key = crypto.createPublicKey(pub);
          const jwk = key.export({ format: 'jwk' });
          jwk.use = 'sig';
          jwk.alg = 'RS256';
          jwk.kid = 'default';
          const jwks = { keys: [jwk] };
          console.log('');
          console.log('=========================================' );
          console.log('COLE ISSO NO CONVEX COMO JWKS');
          console.log('=========================================');
          console.log(JSON.stringify(jwks));
          console.log('=========================================');
          "
